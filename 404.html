<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #020617; /* Warna latar sesuai Admin Core (Slate 950) */
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Kunci layar agar tidak bisa digeser/scroll sama sekali */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* --- ANIMASI PORTAL LOOP --- */
        .portal-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 0;
            pointer-events: none; /* Agar tidak menghalangi klik tombol */
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15), inset 0 0 15px rgba(239, 68, 68, 0.15);
            animation: rotate-ring linear infinite;
        }

        /* Ukuran ring dikecilkan sedikit agar lebih rapi di HP */
        .ring:nth-child(1) { width: 140px; height: 140px; border-top-color: #ef4444; border-bottom-color: #ef4444; animation-duration: 3s; }
        .ring:nth-child(2) { width: 200px; height: 200px; border-left-color: #f87171; border-right-color: #f87171; animation-duration: 6s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 280px; height: 280px; border-top-color: #991b1b; border-bottom-color: #991b1b; animation-duration: 9s; border-style: dashed; }
        .ring:nth-child(4) { width: 380px; height: 380px; border-left-color: #dc2626; border-right-color: #dc2626; animation-duration: 12s; animation-direction: reverse; }
        .ring:nth-child(5) { width: 520px; height: 520px; border-top-color: #7f1d1d; border-bottom-color: #7f1d1d; animation-duration: 20s; opacity: 0.4; }

        @keyframes rotate-ring {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.03); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* --- KONTEN TENGAH --- */
        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
            animation: float-box 6s ease-in-out infinite;
        }

        @keyframes float-box {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Ukuran font menggunakan clamp agar responsif (Mengecil di HP, membesar di PC) */
        .text-404 {
            font-size: clamp(5rem, 25vw, 8rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ef4444, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(239, 68, 68, 0.4);
            letter-spacing: -2px;
        }

        /* --- TYPING ANIMATION --- */
        .typing-container {
            display: inline-block;
            max-width: 100%;
            margin-bottom: 2rem;
        }
        
        .typing-text {
            /* Font mengecil ke 11px di HP agar tulisan panjang ini tidak terpotong */
            font-size: clamp(11px, 3.5vw, 16px);
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 1px;
            border-right: 2px solid #ef4444;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3s steps(40, end) forwards, blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            to { width: 100%; }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #ef4444; }
        }

        /* --- TOMBOL KEMBALI --- */
        .btn-home {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            color: #f8fafc;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: clamp(12px, 3vw, 14px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: rgba(239, 68, 68, 0.8);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.6);
            transform: scale(1.05);
        }

        /* Bintang di background yang menyala halus */
        .bg-stars {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            /* SVGs Base64 untuk bintang kecil warna putih dan merah redup */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="20" cy="20" r="1.5" fill="%23ef4444" opacity="0.3"/><circle cx="200" cy="150" r="1.5" fill="%23ffffff" opacity="0.1"/><circle cx="350" cy="300" r="1" fill="%23ef4444" opacity="0.2"/></svg>') repeat;
            z-index: -1;
            animation: pulse-bg 8s infinite alternate;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="bg-stars"></div>
    
    <!-- Elemen Animasi Portal di Belakang -->
    <div class="portal-container">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- Elemen Konten yang Selalu Berada di Tengah -->
    <div class="content-box">
        <h1 class="text-404">404</h1>
        
        <div class="typing-container">
            <div class="typing-text">Jangan mencari sesuatu yang tidak ada</div>
        </div>
        
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i> Kembali ke Beranda
        </a>
    </div>

</body>
</html>
