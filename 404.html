<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - File Tidak Ditemukan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Tema Biru Laut Dalam (Deep Ocean Blue) */
            background-color: #041222; 
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Kunci layar secara total (Tidak bisa scroll) */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* --- KONTEN TENGAH --- */
        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
        }

        /* --- STYLING TEKS RESPONSIVE --- */
        .text-404 {
            font-size: clamp(4rem, 20vw, 7rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            /* Gradient Biru Laut / Cyan */
            background: linear-gradient(to right, #0ea5e9, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 30px rgba(14, 165, 233, 0.4);
            letter-spacing: -2px;
        }

        .desc-text {
            font-size: clamp(12px, 3.5vw, 15px);
            color: #bae6fd;
            font-weight: 500;
            max-width: 480px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }

        /* --- TOMBOL --- */
        .btn-home {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.5);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
            color: #f8fafc;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: clamp(12px, 3vw, 14px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-home:hover {
            background: rgba(14, 165, 233, 0.8);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.6);
            transform: scale(1.05);
        }

        /* --- ANIMASI ROBOT MENCARI (SVG CSS) --- */
        .svg-container {
            width: 100%;
            max-width: 400px; /* Ukuran pas untuk PC & HP */
            margin-bottom: 1rem;
        }

        /* 1. Lampu Indikator Server */
        .lamp-cyan { animation: blink-cyan 1.5s infinite alternate; }
        @keyframes blink-cyan { 0% { fill: #0284c7; opacity: 0.5; } 100% { fill: #38bdf8; opacity: 1; filter: drop-shadow(0 0 5px #38bdf8); } }
        
        /* 2. Badan Robot Mengayun (Ngorek-ngorek) */
        .robot-body { animation: body-search 0.6s infinite alternate; transform-origin: 250px 240px; }
        @keyframes body-search { 
            0% { transform: rotate(-3deg) translateX(-2px); } 
            100% { transform: rotate(1deg) translateX(2px); } 
        }

        /* 3. Tangan Robot Mengaduk di Laci */
        .robot-arm { animation: arm-rummage 0.3s infinite alternate; transform-origin: 230px 180px; }
        @keyframes arm-rummage {
            0% { transform: rotate(-5deg) translateX(-5px); }
            100% { transform: rotate(8deg) translateX(5px); }
        }

        /* 4. Kepala Robot Celak-Celuk */
        .robot-head { animation: head-look 3s infinite alternate; transform-origin: 240px 140px; }
        @keyframes head-look {
            0%, 20% { transform: rotate(-5deg) translateX(-5px); }
            40%, 60% { transform: rotate(5deg) translateX(5px); }
            80%, 100% { transform: rotate(-2deg) translateX(0); }
        }

        /* 5. Animasi Tanda Tanya Mundur-Maju Pop Up */
        .question-mark { animation: pop-question 2.5s infinite; transform-origin: 260px 80px; }
        @keyframes pop-question {
            0% { opacity: 0; transform: translateY(15px) scale(0.5) rotate(-10deg); }
            15% { opacity: 1; transform: translateY(0px) scale(1.2) rotate(5deg); }
            25% { transform: translateY(0px) scale(1) rotate(0deg); }
            70% { opacity: 1; transform: translateY(0px) scale(1); }
            85% { opacity: 0; transform: translateY(-15px) scale(0.8); }
            100% { opacity: 0; }
        }

        /* 6. Radar Antena Berkedip */
        .antenna-light { animation: radar-blink 1s infinite; }
        @keyframes radar-blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; filter: drop-shadow(0 0 6px #22d3ee); } }

        /* Bintang / Gelembung Air Background */
        .bg-pattern {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150"><circle cx="20" cy="20" r="1.5" fill="%230ea5e9" opacity="0.15"/><circle cx="90" cy="110" r="2.5" fill="%230ea5e9" opacity="0.2"/></svg>') repeat;
            z-index: -1;
            animation: float-bg 20s linear infinite;
        }
        @keyframes float-bg { from { background-position: 0 0; } to { background-position: 0 -150px; } }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="content-box">
        
        <!-- ============================================== -->
        <!-- ANIMASI SVG MURNI: ROBOT MENCARI FILE          -->
        <!-- ============================================== -->
        <div class="svg-container">
            <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="100%">
                
                <!-- SHADOW BAWAH -->
                <ellipse cx="100" cy="285" rx="55" ry="6" fill="#000" opacity="0.4" />
                <ellipse cx="260" cy="285" rx="60" ry="6" fill="#000" opacity="0.4" />

                <!-- RACK SERVER (Kiri) -->
                <g class="server">
                    <!-- Body Rack -->
                    <rect x="40" y="60" width="110" height="225" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="5"/>
                    <rect x="50" y="70" width="90" height="30" rx="4" fill="#1e293b"/>
                    <rect x="50" y="110" width="90" height="30" rx="4" fill="#1e293b"/>
                    
                    <!-- Laci yang Terbuka / Sedang Dicari (Kosong/Gelap) -->
                    <rect x="45" y="150" width="100" height="35" rx="2" fill="#020617" stroke="#0ea5e9" stroke-width="1"/>
                    <path d="M 45 185 L 145 185 L 135 200 L 55 200 Z" fill="#0ea5e9" opacity="0.2"/> <!-- Efek laci ditarik -->

                    <rect x="50" y="195" width="90" height="30" rx="4" fill="#1e293b"/>
                    <rect x="50" y="235" width="90" height="30" rx="4" fill="#1e293b"/>

                    <!-- Lampu Indikator Biru Cyan -->
                    <circle cx="65" cy="85" r="4" fill="#38bdf8" class="lamp-cyan" />
                    <circle cx="80" cy="85" r="3" fill="#0284c7" />
                    <circle cx="65" cy="125" r="4" fill="#38bdf8" class="lamp-cyan" style="animation-delay: 0.5s;" />
                    <circle cx="65" cy="210" r="4" fill="#38bdf8" class="lamp-cyan" style="animation-delay: 0.2s;" />
                    <circle cx="65" cy="250" r="4" fill="#38bdf8" class="lamp-cyan" style="animation-delay: 0.7s;" />
                </g>

                <!-- ROBOT IMUT (Kanan) -->
                <g class="robot">
                    
                    <!-- Roda / Track Bawah (Tidak goyang) -->
                    <rect x="210" y="255" width="90" height="30" rx="15" fill="#1e293b"/>
                    <circle cx="225" cy="270" r="8" fill="#0f172a"/>
                    <circle cx="255" cy="270" r="8" fill="#0f172a"/>
                    <circle cx="285" cy="270" r="8" fill="#0f172a"/>

                    <!-- Badan Robot Mengayun -->
                    <g class="robot-body">
                        
                        <!-- Leher -->
                        <rect x="245" y="150" width="16" height="25" fill="#64748b"/>
                        
                        <!-- Lengan Belakang (Kanan) -->
                        <path d="M 270 190 Q 290 220 270 240" fill="none" stroke="#475569" stroke-width="10" stroke-linecap="round"/>

                        <!-- Badan Kotak Imut (Warna Cyan/Biru Laut) -->
                        <rect x="215" y="170" width="75" height="85" rx="20" fill="#0ea5e9"/>
                        <!-- Perut / Layar Indikator -->
                        <rect x="230" y="190" width="45" height="20" rx="6" fill="#020617"/>
                        <!-- Loading bar di perut -->
                        <rect x="235" y="197" width="10" height="6" rx="2" fill="#38bdf8" class="lamp-cyan"/>
                        <rect x="250" y="197" width="10" height="6" rx="2" fill="#38bdf8" opacity="0.3"/>
                        <rect x="260" y="197" width="10" height="6" rx="2" fill="#38bdf8" opacity="0.3"/>

                        <!-- Lengan Depan (Kiri) - Sedang Mengaduk Laci -->
                        <g class="robot-arm">
                            <!-- Tangan Memanjang Masuk ke Laci Server (X=145, Y=165) -->
                            <path d="M 235 185 Q 180 180 120 165" fill="none" stroke="#e0f2fe" stroke-width="12" stroke-linecap="round"/>
                            <!-- Capit/Cakar Tangan di dalam laci -->
                            <path d="M 125 155 C 110 155 105 165 105 165 C 105 165 110 175 125 175" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                            <!-- Efek Debu/Kertas Terbang di laci -->
                            <rect x="130" y="150" width="10" height="15" fill="#f8fafc" opacity="0.7" transform="rotate(20 130 150)"/>
                            <rect x="110" y="145" width="8" height="12" fill="#cbd5e1" opacity="0.5" transform="rotate(-15 110 145)"/>
                        </g>

                        <!-- Kepala Robot -->
                        <g class="robot-head">
                            <!-- Antena Imut -->
                            <rect x="250" y="80" width="4" height="20" fill="#64748b"/>
                            <circle cx="252" cy="75" r="6" fill="#22d3ee" class="antenna-light"/>

                            <!-- Bentuk Kepala -->
                            <rect x="205" y="100" width="95" height="60" rx="25" fill="#e0f2fe"/>
                            <!-- Layar Wajah -->
                            <rect x="215" y="112" width="75" height="35" rx="12" fill="#0f172a"/>
                            
                            <!-- Mata (Sedang Bingung / O_o) -->
                            <circle cx="235" cy="130" r="7" fill="#38bdf8"/>
                            <circle cx="270" cy="130" r="4" fill="#38bdf8"/> <!-- Mata sebelahnya kecil/menyipit kebingungan -->
                        </g>
                    </g>
                    
                    <!-- Animasi Tanda Tanya Pop Up dari Kepala -->
                    <g class="question-mark">
                        <!-- Balon Kata (Bubble) -->
                        <path d="M 240 50 C 240 20 300 20 300 50 C 300 75 270 80 260 90 C 255 80 240 70 240 50 Z" fill="#f8fafc" opacity="0.9"/>
                        <!-- Tanda Tanya Biru Laut -->
                        <text x="260" y="65" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#0ea5e9" text-anchor="middle">?</text>
                    </g>
                </g>
            </svg>
        </div>
        <!-- ============================================== -->

        <!-- TEKS KETERANGAN -->
        <h1 class="text-404">404</h1>
        <p class="desc-text">
            Jangan membuat repot robot mungil kita dengan cara anda mencari file yang tidak ada
        </p>
        
        <!-- TOMBOL KEMBALI -->
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i> Kembali ke Beranda
        </a>

    </div>

</body>
</html>
