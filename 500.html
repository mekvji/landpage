<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>500 - Server Down</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #020617; /* Slate 950 - Sesuai Admin Core */
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Kunci layar secara total */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* --- KONTEN TENGAH --- */
        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
        }

        /* --- STYLING TEKS RESPONSIVE --- */
        .text-error {
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.25rem;
            color: #ef4444;
            text-shadow: 0px 0px 20px rgba(239, 68, 68, 0.4);
            letter-spacing: -1px;
        }

        .desc-text {
            font-size: clamp(12px, 3.5vw, 16px);
            color: #cbd5e1;
            font-weight: 500;
            max-width: 450px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }

        .highlight-text { color: #38bdf8; font-weight: 700; }

        /* --- TOMBOL --- */
        .btn-refresh {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            color: #f8fafc;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: clamp(12px, 3vw, 14px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-refresh:hover {
            background: rgba(239, 68, 68, 0.8);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.6);
            transform: scale(1.05);
        }

        /* --- ANIMASI ROBOT & MESIN (SVG CSS) --- */
        .svg-container {
            width: 100%;
            max-width: 380px; /* Ukuran maksimal di PC */
            margin-bottom: 1rem;
        }

        /* 1. Lampu Server Berkedip (Error) */
        .blink-fast { animation: blink 0.3s infinite alternate; }
        .blink-slow { animation: blink 1s infinite alternate; }
        @keyframes blink { 0% { fill: #ef4444; opacity: 1; filter: drop-shadow(0 0 5px #ef4444); } 100% { fill: #7f1d1d; opacity: 0.5; } }
        
        /* 2. Badan Robot Goyang (Sedang bekerja/ngoyo) */
        .robot-body { animation: body-bobble 0.3s infinite alternate; transform-origin: 100px 220px; }
        @keyframes body-bobble { 
            0% { transform: rotate(-2deg) translateY(0px); } 
            100% { transform: rotate(2deg) translateY(-3px); } 
        }

        /* 3. Tangan & Kunci Inggris Mengencangkan Baut */
        .robot-arm { animation: wrench-crank 0.3s infinite alternate; transform-origin: 115px 165px; }
        @keyframes wrench-crank {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(10deg); }
        }

        /* 4. Mata Berkedip Imut */
        .robot-eyes { transform-origin: 100px 112px; animation: eye-blink 4s infinite; }
        @keyframes eye-blink {
            0%, 94%, 98%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.1); }
        }

        /* 5. Keringat Jatuh */
        .sweat { animation: sweat-drop 1.5s infinite; opacity: 0; }
        @keyframes sweat-drop {
            0% { transform: translateY(0px); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; }
        }

        /* 6. Percikan Api Las/Perbaikan */
        .spark { opacity: 0; transform-origin: 200px 145px; }
        .s1 { animation: spark-pop 0.4s infinite; }
        .s2 { animation: spark-pop 0.5s infinite 0.2s; }
        .s3 { animation: spark-pop 0.3s infinite 0.1s; }
        @keyframes spark-pop {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translate(5px, -5px); opacity: 0; }
        }

        /* Bintang Background redup */
        .bg-pattern {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="10" cy="10" r="1" fill="%23475569" opacity="0.2"/><circle cx="60" cy="70" r="1.5" fill="%23475569" opacity="0.3"/></svg>') repeat;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="content-box">
        
        <!-- ============================================== -->
        <!-- ANIMASI SVG MURNI: ROBOT & SERVER              -->
        <!-- ============================================== -->
        <div class="svg-container">
            <svg viewBox="0 0 350 260" xmlns="http://www.w3.org/2000/svg" width="100%">
                
                <!-- BACKGROUND SHADOW -->
                <ellipse cx="100" cy="245" rx="35" ry="5" fill="#000" opacity="0.4" />
                <ellipse cx="250" cy="245" rx="55" ry="5" fill="#000" opacity="0.4" />

                <!-- MESIN / SERVER RACK (Kanan) -->
                <g class="server">
                    <!-- Body Rack -->
                    <rect x="200" y="40" width="100" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="4"/>
                    
                    <!-- Slot Mesin Normal -->
                    <rect x="210" y="60" width="80" height="20" rx="3" fill="#0f172a"/>
                    <rect x="210" y="90" width="80" height="20" rx="3" fill="#0f172a"/>
                    <!-- Slot Mesin Rusak (Tempat Robot Bekerja di Y=145) -->
                    <rect x="210" y="135" width="80" height="20" rx="3" fill="#020617" stroke="#ef4444" stroke-width="1"/>
                    <rect x="210" y="165" width="80" height="20" rx="3" fill="#0f172a"/>
                    <rect x="210" y="195" width="80" height="20" rx="3" fill="#0f172a"/>

                    <!-- Indikator Lampu -->
                    <circle cx="225" cy="70" r="3" fill="#10b981" />
                    <circle cx="225" cy="100" r="3" fill="#10b981" />
                    <circle cx="225" cy="145" r="4" fill="#ef4444" class="blink-fast" /> <!-- Lampu Error Utama -->
                    <circle cx="240" cy="145" r="3" fill="#ef4444" class="blink-slow" />
                    <circle cx="225" cy="175" r="3" fill="#10b981" />
                    
                    <!-- Kabel Konslet Keluar -->
                    <path d="M 200 120 L 180 140" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 200 130 L 185 150" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>

                    <!-- Baut Emas yang Sedang Diperbaiki Robot -->
                    <rect x="195" y="140" width="10" height="10" rx="2" fill="#eab308"/>
                </g>

                <!-- ROBOT TEKNISI IMUT (Kiri) -->
                <g class="robot">
                    
                    <!-- Roda / Track (Tidak ikut goyang) -->
                    <rect x="65" y="215" width="70" height="25" rx="12" fill="#334155"/>
                    <circle cx="78" cy="227.5" r="6" fill="#1e293b"/>
                    <circle cx="100" cy="227.5" r="6" fill="#1e293b"/>
                    <circle cx="122" cy="227.5" r="6" fill="#1e293b"/>

                    <!-- Bagian Tubuh Atas (Ikut Goyang) -->
                    <g class="robot-body">
                        
                        <!-- Leher -->
                        <rect x="92" y="130" width="16" height="20" fill="#64748b"/>
                        
                        <!-- Badan Kotak -->
                        <rect x="70" y="145" width="60" height="70" rx="15" fill="#475569"/>
                        
                        <!-- Layar Perut Baterai / Status -->
                        <rect x="85" y="160" width="30" height="15" rx="4" fill="#0f172a"/>
                        <rect x="88" y="164" width="8" height="7" rx="1" fill="#ef4444" class="blink-slow"/>
                        <rect x="98" y="164" width="8" height="7" rx="1" fill="#ef4444" class="blink-slow"/>

                        <!-- Kepala Imut -->
                        <rect x="55" y="80" width="90" height="55" rx="25" fill="#cbd5e1"/>
                        <!-- Topi Proyek Safety (Warna Kuning) -->
                        <path d="M 55 90 Q 100 20 145 90 Z" fill="#f59e0b"/>
                        <!-- Layar Hitam Wajah -->
                        <rect x="65" y="90" width="70" height="35" rx="12" fill="#020617"/>
                        
                        <!-- Mata Biru Terang (Animasi Berkedip) -->
                        <g class="robot-eyes">
                            <circle cx="85" cy="107" r="8" fill="#38bdf8"/>
                            <circle cx="115" cy="107" r="8" fill="#38bdf8"/>
                        </g>

                        <!-- Pipi Merah (Malu/Ngempet/Ngoyo) -->
                        <ellipse cx="70" cy="115" rx="6" ry="3" fill="#ef4444" opacity="0.6"/>
                        <ellipse cx="130" cy="115" rx="6" ry="3" fill="#ef4444" opacity="0.6"/>

                        <!-- Keringat Imut Jatuh dari Kepala -->
                        <path d="M 145 80 Q 150 90 145 95 Q 140 90 145 80 Z" fill="#38bdf8" class="sweat"/>

                        <!-- Tangan Belakang (Kiri) -->
                        <path d="M 75 160 Q 50 180 60 200" fill="none" stroke="#334155" stroke-width="8" stroke-linecap="round"/>

                        <!-- LENGAN KANAN & KUNCI INGGRIS (Posisi Pas Memegang Baut) -->
                        <!-- Titik Poros Ayunan Lengan: Bahu di (115, 165) -->
                        <g class="robot-arm">
                            <!-- Lengan ke arah server -->
                            <path d="M 115 165 Q 150 150 170 145" fill="none" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
                            
                            <!-- Batang Kunci Inggris -->
                            <rect x="160" y="142" width="30" height="6" fill="#cbd5e1" rx="2"/>
                            
                            <!-- Kepala Kunci Inggris Menggigit Baut Emas (Membentuk Huruf C ke Kanan) -->
                            <path d="M 188 133 C 205 133 210 140 210 145 C 210 150 205 157 188 157 C 183 157 178 152 178 145 C 178 138 183 133 188 133 Z" fill="#e2e8f0"/>
                            <!-- Pemotong Bentuk Huruf C (Sama warna dengan background rack server) -->
                            <circle cx="202" cy="145" r="8" fill="#1e293b"/>
                            
                            <!-- Cakar Tangan Robot Memegang Kunci -->
                            <circle cx="170" cy="145" r="8" fill="#64748b"/>

                            <!-- Percikan Las/Gesekan Kunci di Baut -->
                            <g transform="translate(200, 145)">
                                <line x1="12" y1="-5" x2="22" y2="-15" stroke="#fef08a" stroke-width="2" stroke-linecap="round" class="spark s1"/>
                                <line x1="15" y1="2" x2="30" y2="5" stroke="#fef08a" stroke-width="2" stroke-linecap="round" class="spark s2"/>
                                <line x1="10" y1="10" x2="18" y2="25" stroke="#fef08a" stroke-width="2" stroke-linecap="round" class="spark s3"/>
                            </g>
                        </g>

                    </g>
                </g>
            </svg>
        </div>
        <!-- ============================================== -->

        <!-- TEKS KETERANGAN -->
        <h1 class="text-error">ERROR</h1>
        <p class="desc-text">
            Ups! Server sepertinya sedang ngambek. Teknisi mungil kami dengan <span class="highlight-text">topi kuningnya</span> sedang lembur mengencangkan baut untuk mengembalikan sistem secepat mungkin!
        </p>
        
        <!-- TOMBOL REFRESH -->
        <button onclick="window.location.reload()" class="btn-refresh">
            <i class="fas fa-sync-alt fa-spin-hover"></i> Coba Refresh Halaman
        </button>

    </div>

</body>
</html>
