<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <title>CloudNext | VPS DigitalOcean Tanpa Kartu Kredit</title>
    <meta name="description" content="Deploy VPS DigitalOcean dalam hitungan detik tanpa Kartu Kredit. Infrastruktur enterprise, harga lokal, dan nikmati Free Trial sekarang juga.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* PENGUNCIAN LAYOUT MUTLAK (MENCEGAH GESER KIRI-KANAN) */
        html, body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden !important;
            max-width: 100vw;
            width: 100%;
            margin: 0;
            padding: 0;
            position: relative;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* Ambient Glow Effects (Diperbaiki) */
        .glow-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .glow-bg {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            will-change: transform; /* Tambahan optimasi GPU */
        }
        .glow-top-left { top: -200px; left: -200px; }
        .glow-bottom-right { bottom: -200px; right: -200px; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%); }
        .glow-center { top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, rgba(0,0,0,0) 70%); width: 800px; height: 800px;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CSS UNTUK ANIMASI MARQUEE REVIEWS */
        .marquee-container {
            display: flex;
            overflow: hidden;
            user-select: none;
            gap: 1.5rem;
            padding: 1rem 0;
        }
        
        .marquee-content {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            min-width: 100%;
            gap: 1.5rem;
            animation: scroll-x 25s linear infinite;
            will-change: transform; /* 4. OPTIMASI: Akselerasi GPU untuk animasi halus */
        }

        .marquee-content.reverse {
            animation: scroll-x-reverse 30s linear infinite;
        }

        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }

        @keyframes scroll-x {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-100% - 1.5rem)); }
        }

        @keyframes scroll-x-reverse {
            from { transform: translateX(calc(-100% - 1.5rem)); }
            to { transform: translateX(0); }
        }

        /* CSS UNTUK FAKE NOTIFICATION TOAST */
        .fake-toast {
            position: fixed;
            bottom: 20px;
            left: -400px;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            will-change: left, opacity; /* Optimasi render toast */
        }
        .fake-toast.show {
            left: 20px;
            opacity: 1;
        }
        @media (max-width: 640px) {
            .fake-toast {
                bottom: 10px;
                left: -100%;
                width: calc(100% - 20px);
            }
            .fake-toast.show { left: 10px; }
        }
        
        /* 5. OPTIMASI: Content Visibility untuk bagian bawah (Lazy Render CSS) */
        section { content-visibility: auto; contain-intrinsic-size: 1000px; }
        header, #hero { content-visibility: visible; }
    </style>
</head>
<body class="relative w-full">

    <div class="glow-wrapper">
        <div class="glow-bg glow-top-left"></div>
        <div class="glow-bg glow-bottom-right"></div>
        <div class="glow-bg glow-center"></div>
    </div>

    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            // Navbar scroll effect
            window.addEventListener('scroll', () => {
                const nav = document.getElementById('navbar');
                if (window.scrollY > 20) {
                    nav.classList.add('bg-slate-950/80', 'shadow-xl');
                    nav.classList.remove('border-b-0');
                } else {
                    nav.classList.remove('bg-slate-950/80', 'shadow-xl');
                    nav.classList.add('border-b-0');
                }
            }, { passive: true }); // passive: true meningkatkan performa scroll

            // Fake Notification Logic
            const toast = document.getElementById('sales-toast');
            if(toast) {
                const tUser = document.getElementById('toast-user');
                const tItem = document.getElementById('toast-item');
                const tTime = document.getElementById('toast-time');

                const fakeUsers = ['Alvin***', 'Bagas***', 'Citra***', 'Dendi***', 'Eka***', 'Fajar***', 'Galih***', 'Hana***', 'Irfan***', 'Joko***', 'Kiki***'];
                const fakeItems = ['VPS 1GB RAM', 'VPS 2GB RAM', 'VPS 4GB RAM', 'Topup Saldo Rp50.000', 'Topup Saldo Rp100.000', 'VPS 1GB RAM (SGP)'];
                const fakeTimes = ['Baru saja', '1 menit yang lalu', '3 menit yang lalu', '5 menit yang lalu', '10 menit yang lalu'];

                function showFakeNotification() {
                    const randomUser = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
                    const randomItem = fakeItems[Math.floor(Math.random() * fakeItems.length)];
                    const randomTime = fakeTimes[Math.floor(Math.random() * fakeTimes.length)];

                    tUser.innerText = randomUser;
                    tItem.innerText = randomItem;
                    tTime.innerText = randomTime;

                    toast.classList.add('show');
                    setTimeout(() => { toast.classList.remove('show'); }, 5000);

                    const nextDelay = Math.floor(Math.random() * (20000 - 8000 + 1)) + 8000;
                    setTimeout(showFakeNotification, nextDelay);
                }
                setTimeout(showFakeNotification, 3000);
            }
        });
    </script>
</body>
</html>
